<nav class="topbar">
  <div class="brand"><a href="/" style="color:inherit; text-decoration:none;">Timelapse</a></div>
  <a class="btn ghost" href="/">Dashboard</a>
  <a class="btn ghost" href="/renders">Timelapses</a>
  <a class="btn ghost" href="/live">Live</a>

  <span class="spacer"></span>

  {% include "_tz.html" %}
  <select id="tz-control" aria-label="Timezone"
          class="pill tz-pill"
          style="background: transparent; color: var(--text); border-color: var(--border);">
    <!-- options populated by JS -->
  </select>

  {% if csrf_token %}
  <form action="/logout" method="post" style="margin:0;">
    <input type="hidden" name="csrf_token" value="{{csrf_token}}"/>
    <button class="btn" type="submit">Logout</button>
  </form>
  {% endif %}
</nav>

<script>
  // Populate timezone selector shared across pages
  (function initTzNav(){
    const tzsel = document.getElementById("tz-control");
    if (!tzsel || typeof populateTzSelect !== "function") return;
    populateTzSelect(tzsel);
    tzsel.addEventListener("change", () => {
      const v = tzsel.value;
      setTzOffset(v === "auto" ? null : Number(v));
      document.dispatchEvent(new CustomEvent("tz-nav-change"));
    });
    document.addEventListener("tz-change", () => populateTzSelect(tzsel));
  })();
</script>
