<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login</title>
  {% include "_style.html" %}

</head>
<body>
  <div class="page">
    <div class="surface" style="max-width: 460px; margin: 40px auto 0; padding: 28px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <div>
          <div class="muted" style="font-size:12px; letter-spacing:0.08em;">Welcome back</div>
          <h2 style="margin:4px 0 0 0;">Timelapse Console</h2>
        </div>
        <span class="pill">Secure Area</span>
      </div>

      <form action="/login" method="post" class="form-grid">
        <input type="hidden" name="csrf_token" value="{{csrf_token}}"/>
        <div>
          <label>Username</label>
          <input name="username" autocomplete="username" required/>
        </div>
        <div>
          <label>Password</label>
          <input name="password" type="password" autocomplete="current-password" required/>
        </div>
        <button class="btn primary" type="submit">Sign in</button>
        {% if error %}
          <div style="color: #fca5a5; font-weight:600;">{{error}}</div>
        {% endif %}
      </form>
    </div>
  </div>
</body>
</html>
