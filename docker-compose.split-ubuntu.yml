# Phase 4 split-host app side: Ubuntu runs web + gateway only.
# Standalone compose file; do not combine with docker-compose.yml.
services:
  timelapse:
    init: true
    build: .
    container_name: ${WEB_CONTAINER_NAME:-timelapse-split-web}
    restart: unless-stopped
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
      - WORKER_BASE_URL=${WORKER_BASE_URL:-http://host.docker.internal:18082}
      - USE_SNAPSHOT_THUMBS=${USE_SNAPSHOT_THUMBS:-0}
      - LATEST_FRAME_SOURCE=${LATEST_FRAME_SOURCE:-http}
      - LATEST_FRAME_HTTP_FALLBACK=${LATEST_FRAME_HTTP_FALLBACK:-1}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-filesystem}
      - STORAGE_FILESYSTEM_ROOT=${STORAGE_FILESYSTEM_ROOT:-/data/_storage}
      - STORAGE_S3_ENDPOINT_URL=${STORAGE_S3_ENDPOINT_URL:-}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-}
      - STORAGE_S3_ACCESS_KEY=${STORAGE_S3_ACCESS_KEY:-}
      - STORAGE_S3_SECRET_KEY=${STORAGE_S3_SECRET_KEY:-}
      - STORAGE_S3_REGION=${STORAGE_S3_REGION:-us-east-1}
      - STORAGE_S3_TIMEOUT_SECONDS=${STORAGE_S3_TIMEOUT_SECONDS:-3}
      - PROTOTYPE_ORG_ID=${PROTOTYPE_ORG_ID:-org_dev_001}
      - PROTOTYPE_SITE_ID=${PROTOTYPE_SITE_ID:-site_dev_001}
      - PROTOTYPE_EDGE_ID=${PROTOTYPE_EDGE_ID:-edge_dev_windows_001}
      - CORE_CAMERA_IDS_JSON=${CORE_CAMERA_IDS_JSON:-{}}
      - METADATA_INGEST_TOKEN=${METADATA_INGEST_TOKEN:-}
      - METADATA_MAX_FUTURE_SECONDS=${METADATA_MAX_FUTURE_SECONDS:-300}
      - TIMELINE_SOURCE=${TIMELINE_SOURCE:-metadata}
      - RENDER_SOURCE=${RENDER_SOURCE:-filesystem}
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - CRED_ENC_KEY=${CRED_ENC_KEY}
      - SESSION_HTTPS_ONLY=${SESSION_HTTPS_ONLY:-0}
    ports:
      - "${WEB_PORT:-18080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${TIMELAPSE_DATA_DIR:-./.timelapse-data-split}:/data"
    depends_on:
      - worker-gateway

  worker-gateway:
    init: true
    build: .
    container_name: ${WORKER_GATEWAY_CONTAINER_NAME:-timelapse-split-worker-gateway}
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
      - WORKER_GRPC_ADDR=${WORKER_GRPC_ADDR:-10.20.30.141:15051}
      - WORKER_REST_URL=${WORKER_REST_URL:-http://10.20.30.141:18081}
      - PYTHONPATH=/app:/app/app
    command: ["uvicorn", "app.gateway:app", "--host", "0.0.0.0", "--port", "${WORKER_GATEWAY_PORT:-18082}"]
    volumes:
      - "${TIMELAPSE_DATA_DIR:-./.timelapse-data-split}:/data"


  playwright:
    image: mcr.microsoft.com/playwright:v1.42.0-jammy
    profiles: ["tools"]
    working_dir: /work
    entrypoint: ["bash", "-lc", 'if [ -z "$$SESSION_COOKIE" ]; then echo "SESSION_COOKIE missing" >&2; exit 1; fi; node grab.js']
    environment:
      - APP_HOST=http://timelapse:8080
      - SESSION_COOKIE=${SESSION_COOKIE:-}
      - NODE_PATH=/work/tools/playwright/node_modules
    volumes:
      - .:/work
      - ./screens:/screens
    depends_on:
      - timelapse
